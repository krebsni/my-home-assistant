homeassistant: true
permit_join: true
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto:1883
serial:
  # UPDATE THIS AFTER PLUGGING IN ZIGBEE DONGLE
  # Run: system_profiler SPUSBDataType | grep -i zigbee
  # Or check: ls /dev/tty.* (look for tty.usbmodem or tty.usbserial)
  port: /dev/ttyACM0  # May need to change on macOS
frontend:
  port: 8080
advanced:
  network_key: GENERATE_LATER
  pan_id: GENERATE_LATER
  channel: 20
